<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security Labs | Cipher Terminal</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 950: '#020617', 900: '#0f172a', 800: '#1e293b', 700: '#334155' },
                        brand: { blue: '#3b82f6', cyan: '#06b6d4', glow: '#60a5fa' }
                    },
                    fontFamily: {
                        mono: ['"Fira Code"', '"Courier New"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script>
        // Fix for Lucide React UMD
        window.react = window.React;
    </script>

    <!-- Lucide React -->
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.js"></script>

    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Inter:wght@400;600&display=swap');
        
        body { 
            background-color: #020617; 
            color: #f8fafc; 
        }

        .bg-dot-pattern {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #06b6d4; }
    </style>
</head>
<body class="bg-dot-pattern antialiased selection:bg-brand-blue selection:text-white min-h-screen flex flex-col font-mono">
    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Helper component to securely load Lucide icons
        const LucideIcon = ({ name, size = 15, className = "" }) => {
            if (!window.lucideReact || !window.lucideReact[name]) return null;
            const IconComponent = window.lucideReact[name];
            return <IconComponent size={size} className={className} strokeWidth={2} />;
        };

        const CipherTerminal = () => {
            const [mode, setMode] = useState('encrypt');
            const [algo, setAlgo] = useState('base64');
            const [key, setKey] = useState('3');
            const [inputText, setInputText] = useState('');
            const [outputText, setOutputText] = useState('_');
            const [hasError, setHasError] = useState(false);

            const algoDescriptions = {
                base64:  'Encodes data using Base64 — safe for transmission over text channels. No key required.',
                hex:     'Converts each character to its hexadecimal ASCII code. No key required.',
                rot13:   'Substitutes each letter with the one 13 positions ahead. Symmetric — decrypt = encrypt.',
                caesar:  'Classic shift cipher. Enter a numeric shift value (1–25) as the key.',
                xor:     'XOR each character\'s code against the key string, cycling as needed.',
                atbash:  'Reverses the alphabet: A↔Z, B↔Y, etc. No key required.',
                url:     'Percent-encodes special characters for safe use in URLs. No key required.',
                binary:  'Converts each character to its 8-bit binary representation. No key required.',
                reverse: 'Reverses the entire string. No key required.'
            };

            const keyAlgos = ['caesar', 'xor'];
            const needsKey = keyAlgos.includes(algo);

            // Cipher Logic (Exact match to your provided JS)
            const toBase64 = (s) => btoa(unescape(encodeURIComponent(s)));
            const fromBase64 = (s) => { try { return decodeURIComponent(escape(atob(s.trim()))); } catch { throw new Error('Invalid Base64'); } };
            const toHex = (s) => Array.from(s).map(c => c.charCodeAt(0).toString(16).padStart(2,'0')).join(' ');
            const fromHex = (s) => { try { return s.trim().split(/\s+/).map(h => String.fromCharCode(parseInt(h,16))).join(''); } catch { throw new Error('Invalid Hex'); } };
            const rot13 = (s) => s.replace(/[a-zA-Z]/g, c => String.fromCharCode(c.charCodeAt(0) + (c.toLowerCase() < 'n' ? 13 : -13)));
            const caesarEnc = (s, shift) => {
                shift = ((parseInt(shift) || 3) % 26 + 26) % 26;
                return s.replace(/[a-zA-Z]/g, c => {
                    const b = c <= 'Z' ? 65 : 97;
                    return String.fromCharCode((c.charCodeAt(0) - b + shift) % 26 + b);
                });
            };
            const caesarDec = (s, shift) => caesarEnc(s, 26 - ((parseInt(shift) || 3) % 26 + 26) % 26);
            const xorBytes = (s, keyStr) => {
                if (!keyStr) throw new Error('XOR requires a key');
                return Array.from(s).map((c, i) => String.fromCharCode(c.charCodeAt(0) ^ keyStr.charCodeAt(i % keyStr.length))).join('');
            };
            const xorToHex = (s, keyStr) => Array.from(xorBytes(s,keyStr)).map(c=>c.charCodeAt(0).toString(16).padStart(2,'0')).join(' ');
            const xorFromHex = (s, keyStr) => { const raw = s.trim().split(/\s+/).map(h=>String.fromCharCode(parseInt(h,16))).join(''); return xorBytes(raw, keyStr); };
            const atbash = (s) => s.replace(/[a-zA-Z]/g, c => {
                const b = c <= 'Z' ? 65 : 97;
                return String.fromCharCode(b + 25 - (c.charCodeAt(0) - b));
            });
            const toBinary = (s) => Array.from(s).map(c=>c.charCodeAt(0).toString(2).padStart(8,'0')).join(' ');
            const fromBinary = (s) => { try { return s.trim().split(/\s+/).map(b=>String.fromCharCode(parseInt(b,2))).join(''); } catch { throw new Error('Invalid Binary'); } };

            const processData = () => {
                if (!inputText.trim()) {
                    setOutputText('ERROR: No input provided.');
                    setHasError(true);
                    return;
                }
                setHasError(false);
                try {
                    let result = '';
                    if (mode === 'encrypt') {
                        if (algo === 'base64') result = toBase64(inputText);
                        else if (algo === 'hex') result = toHex(inputText);
                        else if (algo === 'rot13') result = rot13(inputText);
                        else if (algo === 'caesar') result = caesarEnc(inputText, key);
                        else if (algo === 'xor') result = xorToHex(inputText, key);
                        else if (algo === 'atbash') result = atbash(inputText);
                        else if (algo === 'url') result = encodeURIComponent(inputText);
                        else if (algo === 'binary') result = toBinary(inputText);
                        else if (algo === 'reverse') result = inputText.split('').reverse().join('');
                    } else {
                        if (algo === 'base64') result = fromBase64(inputText);
                        else if (algo === 'hex') result = fromHex(inputText);
                        else if (algo === 'rot13') result = rot13(inputText);
                        else if (algo === 'caesar') result = caesarDec(inputText, key);
                        else if (algo === 'xor') result = xorFromHex(inputText, key);
                        else if (algo === 'atbash') result = atbash(inputText);
                        else if (algo === 'url') result = decodeURIComponent(inputText);
                        else if (algo === 'binary') result = fromBinary(inputText);
                        else if (algo === 'reverse') result = inputText.split('').reverse().join('');
                    }
                    setOutputText(result);
                } catch (e) {
                    setOutputText('ERROR: ' + e.message);
                    setHasError(true);
                }
            };

            const swapIO = () => {
                if (!outputText || outputText === '_' || hasError) return;
                setInputText(outputText);
                setOutputText('_');
                setMode(mode === 'encrypt' ? 'decrypt' : 'encrypt');
            };

            const copyOutput = () => {
                if (outputText && outputText !== '_') {
                    navigator.clipboard.writeText(outputText).catch(() => {});
                }
            };

            useEffect(() => {
                if (algo === 'caesar' && !key) setKey('3');
                if (algo === 'xor' && key === '3') setKey('');
            }, [algo]);

            return (
                <div className="w-full max-w-[520px] mx-auto bg-slate-900 border border-brand-cyan shadow-[0_0_30px_rgba(6,182,212,0.08),inset_0_0_10px_rgba(0,0,0,0.4)] overflow-hidden">
                    
                    {/* Header */}
                    <div className="flex justify-between items-center bg-black/30 px-4 py-2 border-b border-brand-cyan/20">
                        <div className="text-brand-cyan text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                            <LucideIcon name="Terminal" size={16} />
                            <span>CIPHER_TERMINAL</span>
                        </div>
                        <div className="flex gap-1.5">
                            <span className="w-2 h-2 rounded-full bg-slate-700"></span>
                            <span className="w-2 h-2 rounded-full bg-slate-700"></span>
                            <span className="w-2 h-2 rounded-full bg-slate-700"></span>
                        </div>
                    </div>

                    {/* Body */}
                    <div className="p-6 flex flex-col gap-4">
                        
                        {/* Tabs */}
                        <div className="flex border border-brand-cyan/20 overflow-hidden">
                            <button 
                                onClick={() => { setMode('encrypt'); setOutputText('_'); }} 
                                className={`flex-1 p-2.5 text-xs tracking-[0.1em] transition-colors ${mode === 'encrypt' ? 'bg-brand-cyan text-slate-950 font-bold' : 'bg-transparent text-slate-400 hover:bg-brand-cyan/10 hover:text-brand-cyan uppercase'}`}
                            >
                                🔒 ENCRYPT
                            </button>
                            <button 
                                onClick={() => { setMode('decrypt'); setOutputText('_'); }} 
                                className={`flex-1 p-2.5 text-xs tracking-[0.1em] transition-colors ${mode === 'decrypt' ? 'bg-brand-cyan text-slate-950 font-bold' : 'bg-transparent text-slate-400 hover:bg-brand-cyan/10 hover:text-brand-cyan uppercase'}`}
                            >
                                🔓 DECRYPT
                            </button>
                        </div>

                        {/* Algorithm + Key */}
                        <div className="flex gap-3">
                            <div className="flex-1 flex flex-col gap-1.5">
                                <label className="text-[0.7rem] uppercase tracking-[0.12em] text-brand-cyan opacity-85 font-bold">Algorithm</label>
                                <select 
                                    value={algo} 
                                    onChange={(e) => setAlgo(e.target.value)} 
                                    className="w-full bg-black/45 border border-brand-cyan/20 text-white font-sans text-[0.82rem] p-2.5 outline-none focus:border-brand-cyan focus:shadow-[0_0_8px_rgba(6,182,212,0.2)] transition-all"
                                >
                                    <option className="bg-slate-900" value="base64">Base64</option>
                                    <option className="bg-slate-900" value="hex">Hex</option>
                                    <option className="bg-slate-900" value="rot13">ROT-13</option>
                                    <option className="bg-slate-900" value="caesar">Caesar Cipher</option>
                                    <option className="bg-slate-900" value="xor">XOR Cipher</option>
                                    <option className="bg-slate-900" value="atbash">Atbash</option>
                                    <option className="bg-slate-900" value="url">URL Encoding</option>
                                    <option className="bg-slate-900" value="binary">Binary</option>
                                    <option className="bg-slate-900" value="reverse">Reverse</option>
                                </select>
                            </div>
                            {needsKey && (
                                <div className="flex-1 flex flex-col gap-1.5">
                                    <label className="text-[0.7rem] uppercase tracking-[0.12em] text-brand-cyan opacity-85 font-bold">
                                        {algo === 'caesar' ? 'Shift (1-25)' : 'XOR Key'}
                                    </label>
                                    <input 
                                        type="text" 
                                        value={key} 
                                        onChange={(e) => setKey(e.target.value)} 
                                        placeholder={algo === 'caesar' ? '3' : 'secret'}
                                        className="w-full bg-black/45 border border-brand-cyan/20 text-white font-sans text-[0.82rem] p-2.5 outline-none focus:border-brand-cyan focus:shadow-[0_0_8px_rgba(6,182,212,0.2)] transition-all" 
                                    />
                                </div>
                            )}
                        </div>

                        {/* Algo Info */}
                        <div className="text-[0.68rem] text-slate-400 leading-relaxed border-l-2 border-brand-cyan/20 pl-2.5">
                            {algoDescriptions[algo]}
                        </div>

                        {/* Input Area */}
                        <div className="flex flex-col gap-1.5 mt-1">
                            <label className="text-[0.7rem] uppercase tracking-[0.12em] text-brand-cyan opacity-85 font-bold">
                                {mode === 'encrypt' ? 'PLAINTEXT INPUT' : 'CIPHERTEXT INPUT'}
                            </label>
                            <textarea 
                                value={inputText}
                                onChange={(e) => setInputText(e.target.value)}
                                placeholder="Type or paste your message here..."
                                className="w-full min-h-[84px] resize-y bg-black/45 border border-brand-cyan/20 text-white font-sans text-[0.82rem] p-2.5 outline-none focus:border-brand-cyan focus:shadow-[0_0_8px_rgba(6,182,212,0.2)] transition-all"
                            ></textarea>
                        </div>

                        {/* Swap Button */}
                        <button onClick={swapIO} className="self-end mt-[-0.4rem] bg-transparent border border-brand-cyan/20 text-brand-cyan font-sans text-[0.68rem] py-1 px-3 hover:bg-brand-cyan/10 hover:border-brand-cyan transition-all flex items-center gap-1">
                            <LucideIcon name="ArrowUpDown" size={12} /> SWAP INPUT / OUTPUT
                        </button>

                        {/* Action Button */}
                        <button onClick={processData} className="w-full p-3 bg-transparent border-2 border-brand-cyan text-brand-cyan font-sans text-[0.85rem] font-bold uppercase tracking-[0.2em] relative overflow-hidden transition-all hover:bg-brand-cyan hover:text-slate-900 hover:shadow-[0_0_25px_#06b6d4] active:scale-[0.97]">
                            {mode === 'encrypt' ? 'ENCRYPT_DATA' : 'DECRYPT_DATA'}
                        </button>

                        {/* Output */}
                        <div className="mt-2">
                            <div className="flex justify-between items-center mb-1.5 text-[0.7rem] uppercase tracking-[0.12em] text-slate-400 font-bold">
                                <span>{mode === 'encrypt' ? 'CIPHERTEXT OUTPUT' : 'PLAINTEXT OUTPUT'}</span>
                                <button onClick={copyOutput} className="bg-transparent border border-brand-cyan/20 text-slate-400 font-sans text-[0.65rem] py-0.5 px-2.5 uppercase tracking-[0.08em] hover:border-brand-cyan hover:text-brand-cyan transition-all">
                                    COPY
                                </button>
                            </div>
                            <div className={`w-full min-h-[64px] bg-black/50 p-3 font-sans text-[0.8rem] break-all leading-relaxed border ${hasError ? 'border-red-500/35 text-red-500' : 'border-brand-cyan/20 text-green-400'}`}>
                                {outputText}
                            </div>
                        </div>

                    </div>

                    {/* Status Bar */}
                    <div className="flex gap-6 px-4 py-1.5 text-[0.65rem] text-slate-400 bg-black/30 border-t border-brand-cyan/20 items-center">
                        <div className="flex items-center gap-1.5">
                            <span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-[pulse_2s_infinite]"></span>
                            SECURE
                        </div>
                        <span>INPUT: {inputText.length} CHARS</span>
                        <span>OUTPUT: {outputText === '_' ? 0 : outputText.length} CHARS</span>
                    </div>
                </div>
            );
        };

        const App = () => {
            return (
                <div className="min-h-screen flex flex-col justify-center p-4 py-12 relative z-10">
                    
                    <div className="max-w-[520px] w-full mx-auto mb-6">
                        <a href="index.html" className="inline-flex items-center gap-2 text-slate-400 hover:text-brand-cyan transition-colors font-sans text-sm group">
                            <LucideIcon name="ArrowLeft" size={16} className="group-hover:-translate-x-1 transition-transform" /> 
                            <span>Return to Portfolio</span>
                        </a>
                    </div>
                    
                    <CipherTerminal />

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
